<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Axiom ATMX Vanilla Web Test</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-slate-50 text-slate-800 p-8 max-w-4xl mx-auto font-sans">
        <nav
            class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-8 border border-slate-200"
        >
            <div class="font-bold text-xl text-blue-600">Axiom ATMX Web</div>
            <ax-engine-status
                loading-text="Connecting..."
                ready-text="✅ Engine Online"
                error-text="❌ Failed"
            >
            </ax-engine-status>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div
                    class="bg-white p-6 rounded-xl shadow-sm border border-slate-200"
                >
                    <h2 class="text-lg font-bold border-b pb-4 mb-4">
                        1. Register
                    </h2>

                    <!-- ✨ MAGIC: We use the TS SDK method directly. No args required! -->
                    <form
                        :ax-mutate="sdk.pyExample.register()"
                        class="space-y-4"
                    >
                        <div>
                            <label
                                class="text-[10px] font-bold text-slate-400 uppercase"
                                >Email</label
                            >
                            <!-- We use user.email and the engine automatically builds the object FastAPI expects! -->
                            <input
                                type="text"
                                name="user.email"
                                value="test@test.com"
                                class="w-full mt-1 p-2 bg-slate-50 border rounded-md outline-none"
                            />
                            <div
                                ax-error-for="email"
                                class="text-red-500 text-xs mt-1 font-bold"
                                hidden
                            ></div>
                        </div>

                        <div>
                            <label
                                class="text-[10px] font-bold text-slate-400 uppercase"
                                >Password</label
                            >
                            <input
                                type="password"
                                name="user.password"
                                value="123456"
                                class="w-full mt-1 p-2 bg-slate-50 border rounded-md outline-none"
                            />
                            <div
                                ax-error-for="password"
                                class="text-red-500 text-xs mt-1 font-bold"
                                hidden
                            ></div>
                        </div>

                        <button
                            type="submit"
                            ax-bind:disabled="$state.isMutating"
                            class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-900 disabled:opacity-50 transition"
                        >
                            <span ax-when="idle, data, error">Register</span>
                            <span ax-when="mutating" hidden
                                >Registering...</span
                            >
                            <span
                                ax-when="success"
                                class="text-green-400"
                                hidden
                                >✅ Registered!</span
                            >
                        </button>
                        <div
                            ax-when="error"
                            class="text-red-500 text-xs mt-2 font-bold"
                            ax-text="$error.message"
                            hidden
                        ></div>
                    </form>
                </div>

                <div
                    class="bg-white p-6 rounded-xl shadow-sm border border-slate-200"
                >
                    <h2 class="text-lg font-bold border-b pb-4 mb-4">
                        2. Login
                    </h2>
                    <!-- ✨ MAGIC: Strongly typed login method with declarative auth storage! -->
                    <form
                        :ax-mutate="sdk.pyExample.login()"
                        ax-headers="{ 'Content-Type': 'application/x-www-form-urlencoded' }"
                        ax-store-token="$data.access_token"
                        class="space-y-4"
                    >
                        <div>
                            <label
                                class="text-[10px] font-bold text-slate-400 uppercase"
                                >Email (Username)</label
                            >
                            <input
                                type="text"
                                name="username"
                                value="test@test.com"
                                class="w-full mt-1 p-2 bg-slate-50 border rounded-md outline-none"
                            />
                        </div>
                        <div>
                            <label
                                class="text-[10px] font-bold text-slate-400 uppercase"
                                >Password</label
                            >
                            <input
                                type="password"
                                name="password"
                                value="123456"
                                class="w-full mt-1 p-2 bg-slate-50 border rounded-md outline-none"
                            />
                        </div>
                        <button
                            type="submit"
                            ax-bind:disabled="$state.isMutating"
                            class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 disabled:opacity-50 transition"
                        >
                            <span ax-when="idle, data, error">Login</span>
                            <span ax-when="mutating" hidden>Logging in...</span>
                            <span ax-when="success" class="text-white" hidden
                                >✅ Token Stored!</span
                            >
                        </button>
                        <div
                            ax-when="error"
                            class="text-red-500 text-xs mt-2 font-bold"
                            ax-text="$error.message"
                            hidden
                        ></div>
                    </form>
                </div>
            </div>

            <div class="space-y-6">
                <div
                    class="bg-white p-6 rounded-xl shadow-sm border border-slate-200"
                >
                    <div
                        class="flex justify-between items-center border-b pb-4 mb-4"
                    >
                        <h2 class="text-lg font-bold">3. Create Item</h2>
                        <span
                            class="text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded font-bold uppercase"
                            >Requires Token</span
                        >
                    </div>
                    <form
                        :ax-mutate="sdk.pyExample.createItem()"
                        ax-refresh="pyExample.list_items"
                        class="space-y-4"
                    >
                        <div>
                            <label
                                class="text-[10px] font-bold text-slate-400 uppercase"
                                >Item Title</label
                            >
                            <input
                                type="text"
                                name="item.title"
                                value="My Web Item"
                                class="w-full mt-1 p-2 bg-slate-50 border rounded-md outline-none"
                            />
                        </div>
                        <div>
                            <label
                                class="text-[10px] font-bold text-slate-400 uppercase"
                                >Description</label
                            >
                            <input
                                type="text"
                                name="item.description"
                                value="Created via declarative ATMX bindings!"
                                class="w-full mt-1 p-2 bg-slate-50 border rounded-md outline-none"
                            />
                        </div>
                        <button
                            type="submit"
                            ax-bind:disabled="$state.isMutating"
                            class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 disabled:opacity-50 transition"
                        >
                            <span ax-when="idle, data, error">Create Item</span>
                            <span ax-when="mutating" hidden>Sending...</span>
                            <span ax-when="success" class="text-white" hidden
                                >✅ Created!</span
                            >
                        </button>
                        <div
                            ax-when="error"
                            class="text-red-500 text-xs mt-2 font-bold"
                            ax-text="$error.message"
                            hidden
                        ></div>
                    </form>
                </div>

                <!-- ✨ MAGIC: Typed List Fetching -->
                <div
                    :ax-query="sdk.pyExample.listItems({ limit: 10 })"
                    class="bg-white p-6 rounded-xl shadow-sm border border-slate-200"
                >
                    <div
                        class="flex justify-between items-center border-b pb-4 mb-4"
                    >
                        <h2 class="text-lg font-bold">4. Items List</h2>
                        <button
                            ax-trigger="refresh"
                            class="text-xs font-bold text-blue-600 hover:underline"
                        >
                            REFRESH
                        </button>
                    </div>

                    <div
                        ax-when="loading"
                        class="text-center py-8 text-slate-400 font-medium animate-pulse"
                    >
                        Fetching items...
                    </div>
                    <div
                        ax-when="error"
                        class="text-red-500 text-sm font-bold p-4 bg-red-50 rounded"
                        ax-text="$error.message"
                        hidden
                    ></div>

                    <div ax-when="data, success" hidden class="space-y-3">
                        <div
                            ax-if="$data.length === 0"
                            class="text-sm text-slate-500 italic text-center py-4"
                        >
                            No items found. Create one above!
                        </div>

                        <ul class="space-y-2">
                            <!-- ✨ MAGIC: Fully declarative lists using our new Phase 1 Engine Features -->
                            <li
                                ax-for="$item in $data"
                                ax-key="$item.id"
                                class="p-3 bg-slate-50 border rounded-lg"
                            >
                                <div
                                    class="font-bold text-slate-800"
                                    ax-text="$item.title"
                                ></div>
                                <div
                                    class="text-xs text-slate-500"
                                    ax-text="$item.description"
                                ></div>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <script type="module">
            const scriptUrl = `https://atmx.axiomcore.dev/latest/atmx.es.js?t=${Date.now()}`;
            const { atmx } = await import(scriptUrl);
            const { sdk } = await import("./generated/sdk.js");

            window.atmx = atmx;
            window.sdk = sdk;

            // ✨ The init() function now returns a typed Result, allowing you to catch
            // network/wasm failures gracefully!
            const result = await atmx.init({
                debug: true,
                contracts: {
                    pyExample: {
                        baseUrl: "http://localhost:8000",
                        contractUrl: "./py-example.axiom",
                    },
                },
            });

            if (result.ok) {
                atmx.triggerQuery(document.body);
            } else {
                console.error("Fatal Engine Failure:", result.error);
            }
        </script>
    </body>
</html>
